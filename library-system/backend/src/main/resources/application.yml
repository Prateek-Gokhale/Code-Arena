spring:
  application:
    name: booknest-ai

  # H2 in-memory database for development
  datasource:
    url: jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ''

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  sql:
    init:
      mode: always

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# JWT configuration
app:
  jwt:
    secret: 7c4b8f2e9d1a6c3f5e8b2d9a7f4c1e6b3d8a5f2c9e6b3d0a7f4c1e8b5d2a9f6
    expiration: 86400000       # 24 hours in ms
    refresh-expiration: 604800000  # 7 days in ms

  # Fine calculation
  fine:
    per-day: 5.0   # ₹5 per overdue day
    loan-days: 14  # default loan period

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tags-sorter: alpha
  info:
    title: BookNest AI API
    version: 1.0.0
    description: Complete BookNest AI REST API

logging:
  level:
    com.library: DEBUG
    org.springframework.security: WARN

server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: flight-service-route
          uri: lb://flight-service
          predicates:
            - Path=/api/flights/**
        - id: booking-service-route
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - http://localhost:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info
